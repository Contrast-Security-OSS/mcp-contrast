name: Gradle Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional explicit release version, e.g. 2.1.0. Leave blank for next patch.
        required: false
        default: ''
        type: string

concurrency:
  group: gradle-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SBOM_DIR: build/release-sboms
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Ensure release runs from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Gradle Release must be dispatched from main, but got $GITHUB_REF"
          exit 1

      - name: Validate release version input
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [[ -n "$RELEASE_VERSION" && ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must look like 2.1.0, without leading v"
            exit 1
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify tracked worktree is clean
        run: |
          git diff --quiet
          git diff --cached --quiet

      - name: Run release validation build
        run: ./gradlew clean spotlessCheck check :contrast-mcp-stdio-app:integrationTest :contrast-mcp-stdio-app:bootJar --no-daemon

      - name: Create or reuse release tag
        id: versions
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git fetch --force --tags origin

          git diff --quiet
          git diff --cached --quiet

          current_head="$(git rev-parse HEAD)"

          if [[ -n "$RELEASE_VERSION" ]]; then
            tag_name="v${RELEASE_VERSION}"

            if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
              tag_commit="$(git rev-list -n 1 "${tag_name}")"
              if [[ "$tag_commit" != "$current_head" ]]; then
                echo "Tag ${tag_name} already exists at ${tag_commit}, not current HEAD ${current_head}"
                exit 1
              fi
              echo "Reusing existing release tag ${tag_name} at current HEAD"
            else
              ./gradlew release -Prelease.forceVersion="${RELEASE_VERSION}" --no-daemon
            fi
          else
            existing_head_tag="$(
              git tag --points-at HEAD \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V \
                | tail -n 1 || true
            )"

            if [[ -n "$existing_head_tag" ]]; then
              tag_name="$existing_head_tag"
              RELEASE_VERSION="${tag_name#v}"
              echo "Reusing existing release tag ${tag_name} at current HEAD"
            else
              ./gradlew release --no-daemon
              tag_name="$(
                git tag --points-at HEAD \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | sort -V \
                  | tail -n 1 || true
              )"

              if [[ -z "$tag_name" ]]; then
                echo "Axion release did not leave a vX.Y.Z tag on HEAD"
                exit 1
              fi
              RELEASE_VERSION="${tag_name#v}"
            fi
          fi

          tag_commit="$(git rev-list -n 1 "${tag_name}")"
          if [[ "$tag_commit" != "$current_head" ]]; then
            echo "Release tag ${tag_name} points at ${tag_commit}, not current HEAD ${current_head}"
            exit 1
          fi

          git diff --quiet
          git diff --cached --quiet

          echo "release=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Checkout Release Tag
        run: git checkout --detach "${{ steps.versions.outputs.tag }}"

      - name: Verify release tag matches Gradle version
        run: |
          actual="$(./gradlew -q printVersion --no-daemon)"
          expected="${{ steps.versions.outputs.release }}"

          if [ "$actual" != "$expected" ]; then
            echo "Gradle version $actual does not match tag ${{ steps.versions.outputs.tag }}"
            exit 1
          fi

      - name: Build Release Artifact
        run: |
          ./gradlew clean :contrast-mcp-stdio-app:bootJar -x test --no-daemon
          test -f "contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate release jar SBOMs
        run: |
          mkdir -p "$SBOM_DIR"
          syft scan file:contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar \
            -o "cyclonedx-json=$SBOM_DIR/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.cdx.json" \
            -o "spdx-json=$SBOM_DIR/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.spdx.json"
          for sbom in \
            "$SBOM_DIR/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.cdx.json" \
            "$SBOM_DIR/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.spdx.json"; do
            test -s "$sbom"
            jq empty "$sbom"
          done

      - name: Verify tracked worktree is clean before publishing
        run: |
          git diff --quiet
          git diff --cached --quiet

      - name: Validate public Artifactory release configuration
        env:
          CONTRAST_JFROG_URL: ${{ vars.CONTRAST_JFROG_URL }}
          JFROG_OIDC_PROVIDER_NAME: ${{ vars.JFROG_OIDC_PROVIDER_NAME }}
        run: |
          test -n "$CONTRAST_JFROG_URL" || { echo "Missing repository variable CONTRAST_JFROG_URL"; exit 1; }
          test -n "$JFROG_OIDC_PROVIDER_NAME" || { echo "Missing repository variable JFROG_OIDC_PROVIDER_NAME"; exit 1; }

      - name: Set up JFrog CLI
        id: setup-jfrog-cli
        uses: jfrog/setup-jfrog-cli@88e9eba31c07e31beefa4cef5c0e93d1af9535d7 # v4.6.1
        env:
          JF_URL: ${{ vars.CONTRAST_JFROG_URL }}
        with:
          oidc-provider-name: ${{ vars.JFROG_OIDC_PROVIDER_NAME }}

      - name: Publish contrast-mcp-core to public Artifactory
        env:
          ORG_GRADLE_PROJECT_contrastArtifactoryUser: ${{ steps.setup-jfrog-cli.outputs.oidc-user }}
          ORG_GRADLE_PROJECT_contrastArtifactoryPassword: ${{ steps.setup-jfrog-cli.outputs.oidc-token }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.CODE_SIGNING_PKEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.CODE_SIGNING_PASSPHRASE }}
        run: |
          ./gradlew \
            :contrast-mcp-core:verifyCorePublicationMetadata \
            :contrast-mcp-core:publishMavenJavaPublicationToContrastPublicReleaseRepository \
            --no-daemon

      - name: Attest build provenance for release jar
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar

      - name: Attest release jar CycloneDX SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar
          sbom-path: ${{ env.SBOM_DIR }}/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.cdx.json

      - name: Attest release jar SPDX SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar
          sbom-path: ${{ env.SBOM_DIR }}/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.spdx.json

      - name: Create the trust keys folder
        shell: sh
        run: mkdir -p ~/.docker/trust/private/

      - name: Save PKEY to file
        shell: sh
        env:
          DIGICERT_PKEY: ${{ secrets.DIGICERT_PKEY }}
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
        run: printf '%s\n' "$DIGICERT_PKEY" > ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME"

      - name: Chmod key
        shell: sh
        env:
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
        run: chmod 600 ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME"

      - name: Docker load PKEY
        env:
          DOCKER_CONTENT_TRUST_REPOSITORY_PASSPHRASE: ${{ secrets.DIGICERT_PKEY_PASSPHRASE }}
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
          DOCKER_CONTENT_TRUST_PKEY_ROLE: ${{ secrets.DIGICERT_PKEY_ROLE }}
        run: docker trust key load ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME" --name "$DOCKER_CONTENT_TRUST_PKEY_ROLE"

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Set up QEMU
        uses: step-security/setup-qemu-action@109c6ed9f089be1a250c75fd6a534e30df44e030 # v4.0.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: contrast/mcp-contrast
          tags: |
            type=raw,value=${{ steps.versions.outputs.release }}
            type=raw,value=latest

      - name: Login to DockerHub
        uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (without pushing)
        uses: step-security/docker-build-push-action@846549baaf047e867d038826129a64d81df0f704 # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A separate repository produces the registry-bound image SBOM; these copies are release assets only.
      - name: Generate release Docker image SBOMs
        run: |
          syft scan docker:contrast/mcp-contrast:${{ steps.versions.outputs.release }} \
            -o "cyclonedx-json=$SBOM_DIR/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.cdx.json" \
            -o "spdx-json=$SBOM_DIR/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.spdx.json"
          for sbom in \
            "$SBOM_DIR/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.cdx.json" \
            "$SBOM_DIR/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.spdx.json"; do
            test -s "$sbom"
            jq empty "$sbom"
          done

      - name: Push and sign Docker image with DCT
        env:
          DOCKER_CONTENT_TRUST: 1
          DOCKER_CONTENT_TRUST_REPOSITORY_PASSPHRASE: ${{ secrets.DIGICERT_PKEY_PASSPHRASE }}
        run: |
          # The tags are newline-separated, not comma-separated
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            echo "Pushing and signing $tag"
            docker push "$tag"
          done

      - name: Create GitHub Release
        uses: step-security/action-gh-release@dc29ef0d1f6f9a032a97ec797d9cb7ea788dde41 # v2.6.1
        with:
          tag_name: ${{ steps.versions.outputs.tag }}
          name: Release ${{ steps.versions.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar
            ${{ env.SBOM_DIR }}/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.cdx.json
            ${{ env.SBOM_DIR }}/mcp-contrast-${{ steps.versions.outputs.release }}.sbom.spdx.json
            ${{ env.SBOM_DIR }}/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.cdx.json
            ${{ env.SBOM_DIR }}/mcp-contrast-docker-${{ steps.versions.outputs.release }}.sbom.spdx.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
