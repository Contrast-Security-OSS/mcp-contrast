name: Gradle Release

on:
  workflow_dispatch:

concurrency:
  group: gradle-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Ensure release runs from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Gradle Release must be dispatched from main, but got $GITHUB_REF"
          exit 1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine release versions
        id: versions
        run: |
          # Get current version from gradle.properties (e.g., "0.0.12-SNAPSHOT")
          CURRENT=$(./gradlew -q printVersion --no-daemon)
          echo "Current version: $CURRENT"

          # Strip -SNAPSHOT to get release version (e.g., "0.0.12")
          RELEASE_VERSION=$(echo "$CURRENT" | sed 's/-SNAPSHOT//')
          echo "Release version: $RELEASE_VERSION"

          # Increment patch version for next dev version (e.g., "0.0.13-SNAPSHOT")
          NEXT_VERSION=$(echo "$RELEASE_VERSION" | awk -F. '{$NF = $NF + 1;} 1' OFS=.)
          NEXT_DEV_VERSION="${NEXT_VERSION}-SNAPSHOT"
          echo "Next dev version: $NEXT_DEV_VERSION"

          # Output for use in later steps
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_DEV_VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Release
        run: |
          ./gradlew setVersion -PnewVersion="${{ steps.versions.outputs.release }}" --no-daemon
          ./gradlew clean spotlessCheck check :contrast-mcp-stdio-app:integrationTest :contrast-mcp-stdio-app:bootJar --no-daemon
          test -f "contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar"
          git add gradle.properties
          git commit -m "[gradle-release] prepare release v${{ steps.versions.outputs.release }}"
          git tag v${{ steps.versions.outputs.release }}
          ./gradlew setVersion -PnewVersion="${{ steps.versions.outputs.next }}" --no-daemon
          git add gradle.properties
          git commit -m "[gradle-release] prepare next development iteration"

      - name: Push Changes and Tags
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin v${{ steps.versions.outputs.release }}

      - name: Checkout Release Tag
        run: git checkout v${{ steps.versions.outputs.release }}

      - name: Build Release Artifact
        run: ./gradlew clean :contrast-mcp-stdio-app:bootJar -x test --no-daemon

      - name: Attest build provenance for release jar
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar

      - name: Create GitHub Release
        uses: step-security/action-gh-release@277bfa82abcfdb73e5bbb19e213fd76532ee2be5 # v3.0.0
        with:
          tag_name: v${{ steps.versions.outputs.release }}
          name: Release v${{ steps.versions.outputs.release }}
          draft: false
          prerelease: false
          files: contrast-mcp-stdio-app/build/libs/mcp-contrast-${{ steps.versions.outputs.release }}.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the trust keys folder
        shell: sh
        run: mkdir -p ~/.docker/trust/private/

      - name: Save PKEY to file
        shell: sh
        env:
          DIGICERT_PKEY: ${{ secrets.DIGICERT_PKEY }}
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
        run: printf '%s\n' "$DIGICERT_PKEY" > ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME"

      - name: Chmod key
        shell: sh
        env:
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
        run: chmod 600 ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME"

      - name: Docker load PKEY
        env:
          DOCKER_CONTENT_TRUST_REPOSITORY_PASSPHRASE: ${{ secrets.DIGICERT_PKEY_PASSPHRASE }}
          DOCKER_CONTENT_TRUST_KEY_FILENAME: ${{ secrets.DIGICERT_PKEY_FILENAME }}
          DOCKER_CONTENT_TRUST_PKEY_ROLE: ${{ secrets.DIGICERT_PKEY_ROLE }}
        run: docker trust key load ~/.docker/trust/private/"$DOCKER_CONTENT_TRUST_KEY_FILENAME" --name "$DOCKER_CONTENT_TRUST_PKEY_ROLE"

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Set up QEMU
        uses: step-security/setup-qemu-action@109c6ed9f089be1a250c75fd6a534e30df44e030 # v4.0.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: contrast/mcp-contrast
          tags: |
            type=raw,value=${{ steps.versions.outputs.release }}
            type=raw,value=latest

      - name: Login to DockerHub
        uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (without pushing)
        uses: step-security/docker-build-push-action@846549baaf047e867d038826129a64d81df0f704 # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push and sign Docker image with DCT
        env:
          DOCKER_CONTENT_TRUST: 1
          DOCKER_CONTENT_TRUST_REPOSITORY_PASSPHRASE: ${{ secrets.DIGICERT_PKEY_PASSPHRASE }}
        run: |
          # The tags are newline-separated, not comma-separated
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            echo "Pushing and signing $tag"
            docker push "$tag"
          done
