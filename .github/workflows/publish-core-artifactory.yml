name: Publish contrast-mcp-core to Artifactory

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to publish to internal Maven, for example v1.0.1
        required: true
        type: string

concurrency:
  group: publish-core-artifactory-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-core-artifact:
    name: Verify release artifact without Artifactory secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      verified_commit_sha: ${{ steps.release.outputs.verified_commit_sha }}
      verified_version: ${{ steps.release.outputs.verified_version }}
      verified_coordinate: ${{ steps.release.outputs.verified_coordinate }}
    defaults:
      run:
        shell: bash
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Resolve and validate GitHub Release tag
        id: release
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid release_tag. Expected an existing GitHub Release tag like v1.0.1."
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            echo "Invalid release_tag. Tag was not found."
            exit 1
          fi

          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          git checkout --detach "refs/tags/${RELEASE_TAG}"

          commit_sha="$(git rev-parse HEAD)"
          version="$(./gradlew -q printVersion --no-daemon)"
          if [[ "${version}" == *-SNAPSHOT ]]; then
            echo "Refusing to publish SNAPSHOT version from protected Artifactory workflow."
            exit 1
          fi
          if [[ "v${version}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag does not match Gradle project version."
            exit 1
          fi

          coordinate="com.contrast.labs.ai.mcp:contrast-mcp-core:${version}"
          {
            echo "verified_commit_sha=${commit_sha}"
            echo "verified_version=${version}"
            echo "verified_coordinate=${coordinate}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run release-health and local publication checks
        run: |
          ./gradlew \
            clean \
            spotlessCheck \
            checkstyleMain \
            checkstyleTest \
            test \
            :contrast-mcp-stdio-app:bootJar \
            :contrast-mcp-core:publishToMavenLocal \
            :contrast-mcp-core:verifyCorePublicationMetadata \
            --no-daemon

      - name: Write sanitized verification evidence
        run: |
          mkdir -p build/artifactory-publish-evidence
          {
            echo "workflow=publish-contrast-mcp-core-artifactory"
            echo "source_repo=${GITHUB_REPOSITORY}"
            echo "source_ref=${RELEASE_TAG}"
            echo "source_commit=${{ steps.release.outputs.verified_commit_sha }}"
            echo "github_release=${RELEASE_TAG}"
            echo "coordinate=${{ steps.release.outputs.verified_coordinate }}"
            echo "repository=contrast-internal-maven-release"
            echo "repository_url=<redacted>"
            echo "verification_status=passed"
          } > build/artifactory-publish-evidence/verify-core-artifact.env

      - name: Upload sanitized verification evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contrast-mcp-core-artifactory-verification-evidence
          path: build/artifactory-publish-evidence/verify-core-artifact.env
          if-no-files-found: error
          retention-days: 30

  publish-core-artifact:
    name: Publish release artifact
    runs-on: ubuntu-latest
    needs: verify-core-artifact
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_COMMIT_SHA: ${{ needs.verify-core-artifact.outputs.verified_commit_sha }}
      EXPECTED_VERSION: ${{ needs.verify-core-artifact.outputs.verified_version }}
      EXPECTED_COORDINATE: ${{ needs.verify-core-artifact.outputs.verified_coordinate }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Re-validate release source before using Artifactory secrets
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid release_tag. Expected an existing GitHub Release tag like v1.0.1."
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          git checkout --detach "refs/tags/${RELEASE_TAG}"

          commit_sha="$(git rev-parse HEAD)"
          if [[ "${commit_sha}" != "${EXPECTED_COMMIT_SHA}" ]]; then
            echo "Release commit changed between verification and publish jobs."
            exit 1
          fi

          version="$(./gradlew -q printVersion --no-daemon)"
          if [[ "${version}" == *-SNAPSHOT ]]; then
            echo "Refusing to publish SNAPSHOT version from protected Artifactory workflow."
            exit 1
          fi
          if [[ "${version}" != "${EXPECTED_VERSION}" || "v${version}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag, verified version, and checked-out Gradle version do not match."
            exit 1
          fi

      - name: Re-run core publication metadata verification
        run: ./gradlew :contrast-mcp-core:verifyCorePublicationMetadata --no-daemon

      - name: Check release coordinate is not already published
        env:
          CONTRAST_ARTIFACTORY_RELEASE_URL: ${{ secrets.CONTRAST_ARTIFACTORY_RELEASE_URL }}
          CONTRAST_ARTIFACTORY_USER: ${{ secrets.CONTRAST_ARTIFACTORY_USER }}
          CONTRAST_ARTIFACTORY_PASSWORD: ${{ secrets.CONTRAST_ARTIFACTORY_PASSWORD }}
        run: |
          mkdir -p build/artifactory-publish-evidence
          {
            echo "workflow=publish-contrast-mcp-core-artifactory"
            echo "source_repo=${GITHUB_REPOSITORY}"
            echo "source_ref=${RELEASE_TAG}"
            echo "source_commit=${EXPECTED_COMMIT_SHA}"
            echo "github_release=${RELEASE_TAG}"
            echo "coordinate=${EXPECTED_COORDINATE}"
            echo "repository=contrast-internal-maven-release"
            echo "repository_url=<redacted>"
          } > build/artifactory-publish-evidence/publish-core-artifact.env

          if [[ -z "${CONTRAST_ARTIFACTORY_RELEASE_URL}" ]]; then
            echo "Missing required secret for Artifactory release URL."
            echo "artifactory_preexistence=not_checked" >> build/artifactory-publish-evidence/publish-core-artifact.env
            echo "publish_status=blocked_missing_release_url_secret" >> build/artifactory-publish-evidence/publish-core-artifact.env
            exit 1
          fi

          group_path="com/contrast/labs/ai/mcp"
          artifact_path="${group_path}/contrast-mcp-core/${EXPECTED_VERSION}/contrast-mcp-core-${EXPECTED_VERSION}.pom"
          artifact_url="${CONTRAST_ARTIFACTORY_RELEASE_URL%/}/${artifact_path}"
          http_status="$(
            curl \
              --silent \
              --head \
              --output /dev/null \
              --write-out "%{http_code}" \
              --user "${CONTRAST_ARTIFACTORY_USER}:${CONTRAST_ARTIFACTORY_PASSWORD}" \
              "${artifact_url}" 2>/dev/null || true
          )"

          if [[ "${http_status}" =~ ^(200|201|204|301|302|307|308)$ ]]; then
            echo "artifact_exists_check repository=contrast-internal-maven-release coordinate=${EXPECTED_COORDINATE} status=exists"
            echo "artifactory_preexistence=exists" >> build/artifactory-publish-evidence/publish-core-artifact.env
            echo "publish_status=blocked_coordinate_exists" >> build/artifactory-publish-evidence/publish-core-artifact.env
            exit 1
          fi

          if [[ "${http_status}" != "404" ]]; then
            echo "artifact_exists_check repository=contrast-internal-maven-release coordinate=${EXPECTED_COORDINATE} status=unexpected_http_${http_status}"
            echo "artifactory_preexistence=unexpected_http_${http_status}" >> build/artifactory-publish-evidence/publish-core-artifact.env
            echo "publish_status=blocked_preexistence_check_inconclusive" >> build/artifactory-publish-evidence/publish-core-artifact.env
            exit 1
          fi

          echo "artifact_exists_check repository=contrast-internal-maven-release coordinate=${EXPECTED_COORDINATE} status=not_found"
          echo "artifactory_preexistence=not_found" >> build/artifactory-publish-evidence/publish-core-artifact.env
          echo "publish_status=pending" >> build/artifactory-publish-evidence/publish-core-artifact.env

      - name: Publish core artifact to internal Maven release repository
        env:
          ORG_GRADLE_PROJECT_contrastArtifactoryReleaseUrl: ${{ secrets.CONTRAST_ARTIFACTORY_RELEASE_URL }}
          ORG_GRADLE_PROJECT_contrastArtifactoryUser: ${{ secrets.CONTRAST_ARTIFACTORY_USER }}
          ORG_GRADLE_PROJECT_contrastArtifactoryPassword: ${{ secrets.CONTRAST_ARTIFACTORY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.CODE_SIGNING_PKEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.CODE_SIGNING_PASSPHRASE }}
        run: |
          ./gradlew \
            :contrast-mcp-core:publishMavenJavaPublicationToContrastInternalReleaseRepository \
            --no-daemon
          tmp_evidence="$(mktemp)"
          grep -v '^publish_status=' build/artifactory-publish-evidence/publish-core-artifact.env > "${tmp_evidence}"
          {
            cat "${tmp_evidence}"
            echo "publish_status=passed"
          } > build/artifactory-publish-evidence/publish-core-artifact.env

      - name: Upload sanitized publish evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contrast-mcp-core-artifactory-publish-evidence
          path: build/artifactory-publish-evidence/publish-core-artifact.env
          if-no-files-found: ignore
          retention-days: 30
