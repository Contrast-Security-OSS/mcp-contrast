version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        dependency-type: development
      production-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        dependency-type: production
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
          applies-to: version-updates
          patterns:
              - '*'
          dependency-type: development
      production-dependencies:
          applies-to: version-updates
          patterns:
              - '*'
          dependency-type: production
    cooldown:
      default-days: 7
      include:
          - '*'
      exclude:
          - react

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
