version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      maven-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
          applies-to: version-updates
          patterns:
              - '*'
          dependency-type: development
      production-dependencies:
          applies-to: version-updates
          patterns:
              - '*'
          dependency-type: production
    cooldown:
      default-days: 7
      include:
          - '*'
      exclude:
          - react
